  <rect x="32" y="32" width="192" height="192" rx="28" fill="#4285F4"/>

  <!-- 文件夹主体 - 使用鲜亮浅蓝色 -->
  <rect x="64" y="84" width="128" height="96" rx="12" fill="#E8F4FF" opacity="1"/>
  <path d="M64 84 L 96 84 C 96 68 112 68 112 84 L 192 84" fill="#E8F4FF" opacity="1"/>

  <!-- 搜索放大镜 -->
  <circle cx="150" cy="140" r="28" fill="none" stroke="#ffffff" stroke-width="8"/>
  <line x1="170" y1="160" x2="190" y2="180" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>

  <!-- 文件夹标签 -->
  <text x="128" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">File</text>
