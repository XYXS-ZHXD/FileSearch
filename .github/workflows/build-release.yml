name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.1)'
        required: true
        default: 'v1.0.1'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Generate icon.ico from make_icon.py
        run: python make_icon.py

      - name: Build exe with PyInstaller
        run: |
          pyinstaller FileSearch.spec

      - name: Verify build output
        run: |
          dir dist\
          echo "Build size:"
          (Get-Item dist\FileSearch.exe).length

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FileSearch ${{ steps.version.outputs.tag }}
          body: |
            ## FileSearch ${{ steps.version.outputs.tag }}
            
            便携式 Windows 文件搜索工具，无需安装，放到 U 盘即可使用。
            
            ### 使用方法
            1. 下载 `FileSearch.exe`
            2. 放入需要搜索的目录根目录（或 U 盘根目录）
            3. 双击运行，即可搜索当前目录及所有子目录中的文件
            
            ### 功能特性
            - 实时模糊搜索
            - 双击打开文件
            - 右键菜单：打开文件/文件夹、复制路径、复制文件到剪贴板
            - 支持列排序
            - 暗色主题（Catppuccin Macchiato）
            - 零依赖，单文件绿色版
          files: dist/FileSearch.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
